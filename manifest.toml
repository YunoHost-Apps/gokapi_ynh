#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "gokapi"
name = "Gokapi"
description.en = "Lightweight server to share files"
description.fr = "Serveur léger pour partager des fichiers"

version = "2.2.3~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
admindoc = "https://gokapi.readthedocs.io/"
code = "https://github.com/Forceu/Gokapi"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]

    [resources.sources.main]
    amd64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.3/gokapi-linux_amd64.zip"
    amd64.sha256 = "90f3edaf2ba74e7eba4ab18d8d054e9773b207cdae92d28c41de40e967af5a15"
    i386.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.3/gokapi-linux_386.zip"
    i386.sha256 = "452072a602a39cb9da1db34c0bdee11434fe26021f92803c5535acdcb5ed6052"
    armhf.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.3/gokapi-linux_arm.zip"
    armhf.sha256 = "4a7b242d872b0104b5efacb217191a283abac4adca59baaf69b576b9e2ed8674"
    arm64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.3/gokapi-linux_arm64.zip"
    arm64.sha256 = "61d98d2c8c4db262b3960f840d20add10ac90b24960297fc18c674f189cb5f5b"

    in_subdir = false

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "gokapi-linux_amd64\\.zip"
    autoupdate.asset.i386 = "gokapi-linux_386\\.zip"
    autoupdate.asset.armhf = "gokapi-linux_arm\\.zip"
    autoupdate.asset.arm64 = "gokapi-linux_arm64\\.zip"

    [resources.sources.intermediate]
    amd64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_amd64.zip"
    amd64.sha256 = "e9a87f606485cede6bdabf49de555e9c21469eccd6537e1d2feea042b7874b66"
    i386.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_386.zip"
    i386.sha256 = "836964e148b1843d6ef2b559dcce82bf140ffbadf5f6bec31e697d002f41ec5c"
    armhf.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_arm.zip"
    armhf.sha256 = "b445a648a17ff35a4c8305be10ce3ae3d3b27e49efd11ecd6dbbd824512370aa"
    arm64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_arm64.zip"
    arm64.sha256 = "d986859a0bfdca7699d0a4ff20e01508c5fa6029724b44ce85df8a4157f11ae3"

    in_subdir = false
    prefetch = false

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    

    [resources.permissions]
    main.url = "/"

    [resources.ports]
