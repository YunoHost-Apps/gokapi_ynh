#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "gokapi"
name = "Gokapi"
description.en = "Lightweight server to share files"
description.fr = "Serveur léger pour partager des fichiers"

version = "2.2.2~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
admindoc = "https://gokapi.readthedocs.io/"
code = "https://github.com/Forceu/Gokapi"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]

    [resources.sources.main]
    amd64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.2/gokapi-linux_amd64.zip"
    amd64.sha256 = "4520796daa8a2445c851e46560f7294985a1b18dc53caa1b06ca46c6926c5f67"
    i386.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.2/gokapi-linux_386.zip"
    i386.sha256 = "6e0923b4d8c466f058c76e54f66082a15013b13e08ddf0e1684ff197d740efb8"
    armhf.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.2/gokapi-linux_arm.zip"
    armhf.sha256 = "98389cc219f62aeed28e317120d0a3efab9cb01285651b5ba4a2482d4af51aff"
    arm64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.2.2/gokapi-linux_arm64.zip"
    arm64.sha256 = "369681cacf1c3b8a3a032364e59fef757ab326905a11494ba6907a2b72abf362"

    in_subdir = false

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "gokapi-linux_amd64\\.zip"
    autoupdate.asset.i386 = "gokapi-linux_386\\.zip"
    autoupdate.asset.armhf = "gokapi-linux_arm\\.zip"
    autoupdate.asset.arm64 = "gokapi-linux_arm64\\.zip"

    [resources.sources.intermediate]
    amd64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_amd64.zip"
    amd64.sha256 = "e9a87f606485cede6bdabf49de555e9c21469eccd6537e1d2feea042b7874b66"
    i386.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_386.zip"
    i386.sha256 = "836964e148b1843d6ef2b559dcce82bf140ffbadf5f6bec31e697d002f41ec5c"
    armhf.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_arm.zip"
    armhf.sha256 = "b445a648a17ff35a4c8305be10ce3ae3d3b27e49efd11ecd6dbbd824512370aa"
    arm64.url = "https://github.com/Forceu/Gokapi/releases/download/v2.0.0/gokapi-linux_arm64.zip"
    arm64.sha256 = "d986859a0bfdca7699d0a4ff20e01508c5fa6029724b44ce85df8a4157f11ae3"

    in_subdir = false
    prefetch = false

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    subdirs = [ "data" ]
    

    [resources.permissions]
    main.url = "/"

    [resources.ports]
